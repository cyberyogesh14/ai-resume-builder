<!DOCTYPE html>
<html>
<head>
  <title>Build Resume</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg"></div>

<nav class="resume-navbar">
  <div class="resume-nav-container">

    <div class="resume-logo">
      AI<span>·</span>RESUME
    </div>

    <div class="resume-nav-menu">
      <a href="index.html" class="resume-link">Home</a>
      <a href="features.html" class="resume-link">Features</a>
      <a href="about.html" class="resume-link">About</a>
      <a href="#" class="resume-cta active">Resume Lab</a>
    </div>

  </div>
</nav>

<section class="builder">

  <div class="glass form">
    <h2>Create Resume</h2>
    <input id="name" placeholder="Full Name">
    <input id="role" placeholder="Job Role">
    <input id="skills" placeholder="Skills (comma separated)">
    <textarea id="summary" placeholder="Professional Summary"></textarea>
    <button onclick="generateResume()">Generate Resume</button>
  </div>

  <div class="glass preview">
    <h1 id="p-name">Your Name</h1>
    <h3 id="p-role">Job Role</h3>
    <p id="p-summary">Your summary will appear here.</p>

    <h4>Skills</h4>
    <p id="p-skills">HTML • CSS • JavaScript</p>
  </div>

</section>

<script src="js/app.js"></script>
</body>
</html>
